    .ics-btn:hover { background: #d6eaf8; }
    .print-btn {

    .cal-header-cell { padding: 8px 4px; text-align: center; font-size: 0.8rem; font-weight: bold; }

    .cal-header-cell.sat { background: #f0f0ff; color: #2471a3; }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cal-cell {

      vertical-align: top; position: relative; transition: background 0.2s;

    .cal-cell.sun-col { background: #fffafa; }
    .cal-cell.sat-col { background: #fafaff; }

    .date-num.sat { color: #2471a3; }
    .date-num.hol { color: #c0392b; }
    .holiday-name { font-size: 0.6rem; color: #c0392b; margin-bottom: 3px; }

    .ext-shift {

    .shift.dim { opacity: 0.15; }
    .ext-shift.dim { opacity: 0.15; }
    .shift.lit { outline: 2px solid; border-radius: 4px; }
    .ext-shift.lit { outline: 2px solid; border-radius: 4px; }

    .ext-detail-list li:last-child { border-bottom: none; }

    .ext-fac-col { color: #333; min-width: 120px; }
    .ext-time-col { color: #888; font-size: 0.8rem; }

      body { background: white; padding: 0; }

      .cal-cell.today { outline: none; }

      .cal-header-cell { padding: 4px 2px; font-size: 0.75rem; }
      .cal-cell { min-height: 78px; padding: 4px 3px; border-color: #ccc; }
      .cal-cell.empty { background: #f7f7f7; }
      .date-num { font-size: 0.78rem; margin-bottom: 2px; }
      .holiday-name { font-size: 0.6rem; }
      .shift { font-size: 0.7rem; padding: 2px 4px; margin-bottom: 2px; }
      .shift-lbl { font-size: 0.6rem; min-width: 20px; }
      .ext-shift { font-size: 0.65rem; padding: 2px 4px; margin-bottom: 2px; }
      .ext-fac { max-width: 58px; font-size: 0.6rem; }

      body.printing .shift.dim { opacity: 0.18 !important; }
      body.printing .ext-shift.dim { opacity: 0.18 !important; }
      body.printing .shift.lit { outline: 2px solid; border-radius: 4px; }

      body:not(.printing) .shift.dim,
      body:not(.printing) .ext-shift.dim { opacity: 1 !important; }
      body:not(.printing) .shift.lit,
      body:not(.printing) .ext-shift.lit { outline: none !important; background-color: transparent !important; }

// =====================

function addDays(dateStr, n) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d + n);
  return String(dt.getFullYear()) +
    String(dt.getMonth() + 1).padStart(2, '0') +
    String(dt.getDate()).padStart(2, '0');
}

function getDoW(dateStr) {
  return new Date(dateStr + 'T00:00:00+09:00').getDay(); // 0=Sun
}

function isWeekend(day) {
  const d = getDoW(day.date);
  return d === 0 || d === 6 || day.hol;
}

function fmtDate(dateStr) {
  const m = parseInt(dateStr.slice(5,7));
  const d = parseInt(dateStr.slice(8,10));
  const dow = ['日','月','火','水','木','金','土'][getDoW(dateStr)];
  return `${m}/${d}(${dow})`;
}

function toggleMember(name) {
  const already = activeMembers.has(name);
  activeMembers.clear();
  if (!already) activeMembers.add(name);
  applyHighlight();
}

function applyHighlight() {
  const hasActive = activeMembers.size > 0;

  // Update buttons
  document.querySelectorAll('.member-btn').forEach(btn => {
    const n = btn.dataset.name;
    if (activeMembers.has(n)) {
      btn.classList.add('active');
      btn.style.backgroundColor = MEMBERS[n].color;
      btn.style.borderColor = MEMBERS[n].color;
      btn.style.color = 'white';
    } else {
      btn.classList.remove('active');
      btn.style.backgroundColor = 'white';
      btn.style.borderColor = MEMBERS[n].color;
      btn.style.color = MEMBERS[n].color;
    }
  });

  // Update shifts (calendar + mobile)
  document.querySelectorAll('.shift, .ext-shift, .mobile-shift, .mobile-ext').forEach(el => {
    const person = el.dataset.person;
    if (!hasActive) {
      el.classList.remove('dim', 'lit');
      el.style.outlineColor = '';
      el.style.backgroundColor = '';
    } else if (activeMembers.has(person)) {
      el.classList.remove('dim');
      el.classList.add('lit');
      el.style.outlineColor = MEMBERS[person]?.color || '#333';
      el.style.backgroundColor = (MEMBERS[person]?.color || '#ccc') + '22';
    } else {
      el.classList.add('dim');
      el.classList.remove('lit');
      el.style.outlineColor = '';
      el.style.backgroundColor = '';
    }
  });

  // Update external duty detail panel
  updateExtDetail();
}

function updateExtDetail() {
  if (activeMembers.size === 0) {
    extPanel.style.display = 'none';
    return;
  }

  const names = Array.from(activeMembers);
  const items = [];

  DAYS.forEach(day => {
    day.ext.forEach(e => {
      if (activeMembers.has(e.person)) {
        items.push({ date: day.date, fac: e.fac, person: e.person, time: e.time });
      }
    });
  });

  extTitle.textContent = names.join('・') + ' の外勤一覧';
  extList.innerHTML = '';

  if (items.length === 0) {
    const li = document.createElement('li');
    li.textContent = '外勤なし';
    extList.appendChild(li);
  } else {
    items.forEach(item => {
      const li = document.createElement('li');
      const color = MEMBERS[item.person]?.color || '#333';
      li.innerHTML = `
        <span class="ext-date-col">${fmtDate(item.date)}</span>
        <span class="ext-fac-col">${item.fac}</span>
        <span class="ext-time-col">${item.time}</span>
      `;
      extList.appendChild(li);
    });
  }

  extPanel.style.display = 'block';
}

// =====================
// ICS GENERATION
// =====================
const SLOTS = [
  { key: 'f', label: '1st', summary: '阪大 1st当直',       desc: '阪大心臓血管外科 1st当直（当直）' },
  { key: 's', label: '2nd', summary: '阪大 2nd待機',        desc: '阪大心臓血管外科 2nd待機' },
];

function downloadICS(memberName) {
  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//OSU CVS//当直表 2026-05//JA',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'X-WR-TIMEZONE:Asia/Tokyo',
    'X-WR-CALNAME:' + memberName + ' 当直 2026年5月',
    'BEGIN:VTIMEZONE',
    'TZID:Asia/Tokyo',
    'BEGIN:STANDARD',
    'TZOFFSETFROM:+0900',
    'TZOFFSETTO:+0900',
    'TZNAME:JST',
    'DTSTART:19700101T000000',
    'END:STANDARD',
    'END:VTIMEZONE',
  ];

  let uid = 1;

  DAYS.forEach(day => {
    const ds = day.date.replace(/-/g,'');
    const nextDs = addDays(day.date, 1);

    // 1st/2nd duties — all-day events
    for (const { key, label, summary, desc } of SLOTS) {
      if (day[key] === memberName) {
        lines.push(
          'BEGIN:VEVENT',
          `UID:${label}-${day.date}-${uid++}@osu-cvs`,
          `DTSTART;VALUE=DATE:${ds}`,
          `DTEND;VALUE=DATE:${nextDs}`,
          `SUMMARY:${summary}`,
          `DESCRIPTION:${desc}`,
          'LOCATION:大阪大学附属病院 心臓血管外科',
          'END:VEVENT'
        );
      }
    }

    // External duties
    day.ext.forEach(e => {
      if (e.person !== memberName) return;
      const endDs = addDays(day.date, e.icsE_d);
      lines.push(
        'BEGIN:VEVENT',
        `UID:ext-${day.date}-${e.fac}-${uid++}@osu-cvs`,
        `DTSTART;TZID=Asia/Tokyo:${ds}T${e.icsS}`,
        `DTEND;TZID=Asia/Tokyo:${endDs}T${e.icsE_t}`,
        `SUMMARY:外勤 ${e.fac}`,
        `DESCRIPTION:外勤 ${e.fac}\\n${e.time}`,
        `LOCATION:${e.fac}`,
        'END:VEVENT'
      );
    });
  });

  lines.push('END:VCALENDAR');
  const icsContent = lines.join('\r\n');

  const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `schedule_2026May_${memberName}.ics`;
  a.click();
  URL.revokeObjectURL(url);
}

    day.ext.forEach(e => {
      const c = MEMBERS[e.person]?.color || '#333';
      extHTML += `<div class="ts-ext"><span class="ts-ext-fac">${e.fac}</span><span class="ts-ext-name" style="color:${c}">${e.person}</span><span class="ts-ext-time">${e.time}</span></div>`;
    });

    return `<div class="ts-card">
      <div class="ts-label ${labelClass}">${label} <span class="ts-date">${m}/${d}（${dow}）</span>${holTag}</div>
      <div class="ts-row"><span class="ts-row-lbl">1st</span><span class="ts-row-name" style="color:${fColor}">${day.f}</span></div>
      <div class="ts-row"><span class="ts-row-lbl">2nd</span><span class="ts-row-name" style="color:${sColor}">${day.s}</span></div>
      ${extHTML}
    </div>`;
  }

  container.innerHTML =
    buildCard(todayDay, 'TODAY', 'ts-label-today') +
    buildCard(tmrwDay,  'TOMORROW', 'ts-label-tomorrow');
})();

function printWard() {
  // Generate QR code linking to online schedule
  let qrImg = '';
  if (typeof qrcode === 'function') {
    const qr = qrcode(0, 'M');
    qr.addData('https://ktonai103.github.io/cvs-schedule/2026May/');
    qr.make();
    qrImg = qr.createDataURL(3, 0);
  }

  const DOW_STR = ['日','月','火','水','木','金','土'];
  const B_COLOR = '#1a3660';   // Bクラス: ネイビー
  const C_COLOR = '#7b1818';   // Cクラス: ダークレッド

  function wardColor(name) {
    return MEMBERS[name]?.cls === 'B' ? B_COLOR : C_COLOR;
  }

  function makeRows(days) {
    return days.map(day => {
      const dow = getDoW(day.date);
      const d   = parseInt(day.date.slice(8));
      const isHol = dow === 0 || day.hol;
      const isSat = dow === 6;
      const dateClass = isHol ? 'hol' : isSat ? 'sat' : '';
      const holSpan = day.hol ? `<span class="hol-name">${day.holName}</span>` : '';
      return `<tr>
        <td class="date ${dateClass}">5/${d}（${DOW_STR[dow]}）${holSpan}</td>
        <td class="name" style="color:${wardColor(day.f)}">${day.f}</td>
        <td class="name" style="color:${wardColor(day.s)}">${day.s}</td>
      </tr>`;
    }).join('');
  }

  const cols = [DAYS.slice(0,11), DAYS.slice(11,21), DAYS.slice(21,31)];
  const theadHTML = '<thead><tr><th>日付</th><th>1st</th><th>2nd</th></tr></thead>';

  const html = `<!DOCTYPE html>

  .columns { display: flex; gap: 5mm; align-items: flex-start; }

<div class="header-row">

  ${qrImg ? '<div class="qr-area"><img src="'+qrImg+'"><span>オンライン版</span></div>' : ''}
</div>

  <div class="col"><table>${theadHTML}<tbody>${makeRows(cols[0])}</tbody></table></div>
  <div class="col"><table>${theadHTML}<tbody>${makeRows(cols[1])}</tbody></table></div>
  <div class="col"><table>${theadHTML}<tbody>${makeRows(cols[2])}</tbody></table></div>
</div>

  <div class="legend-item"><div class="legend-bar" style="background:${B_COLOR}"></div>Bクラス（藤内・濱田・多田・手繰・石津）</div>
  <div class="legend-item"><div class="legend-bar" style="background:${C_COLOR}"></div>Cクラス（大山・安田・山下・金森・柿本・上村）</div>
