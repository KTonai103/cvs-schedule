<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心臓血管外科 電話帳</title>
<style>
  :root {
    --primary: #1a73e8;
    --primary-light: #e8f0fe;
    --bg: #f8f9fa;
    --card-bg: #fff;
    --text: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
  }

  /* Header */
  .header {
    background: var(--primary);
    color: #fff;
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 4px rgba(0,0,0,.2);
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 10px;
    letter-spacing: .5px;
  }
  .header .subtitle {
    font-size: 11px;
    opacity: .8;
    margin-bottom: 10px;
  }

  /* Search */
  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    fill: var(--text-secondary);
  }
  .search-input {
    width: 100%;
    padding: 10px 40px 10px 40px;
    border: none;
    border-radius: 24px;
    font-size: 15px;
    background: #fff;
    color: var(--text);
    outline: none;
    box-shadow: var(--shadow);
  }
  .search-input::placeholder { color: #aaa; }
  .clear-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    font-size: 18px;
  }
  .clear-btn.visible { display: flex; }

  /* Tabs */
  .tabs {
    display: flex;
    background: #fff;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 90;
  }
  .tab {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    user-select: none;
  }
  .tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }

  /* Content */
  .content { padding: 8px 12px 80px; }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--primary);
    padding: 12px 8px 6px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  /* Card */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 8px;
    overflow: hidden;
    transition: box-shadow .15s;
  }
  .card:active { box-shadow: 0 1px 6px rgba(0,0,0,.18); }

  .card-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    gap: 12px;
  }
  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--primary-light);
    color: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
  }
  .avatar.staff { background: #fce8e6; color: #d93025; }
  .avatar.shared { background: #e6f4ea; color: #1e8e3e; }
  .card-name {
    flex: 1;
    min-width: 0;
  }
  .card-name .name {
    font-size: 15px;
    font-weight: 600;
  }
  .card-name .reading {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 1px;
  }
  .card-name .year {
    font-size: 11px;
    color: var(--text-secondary);
  }
  .expand-icon {
    width: 20px;
    height: 20px;
    fill: var(--text-secondary);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .card.open .expand-icon { transform: rotate(180deg); }

  .card-body {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
  }
  .card.open .card-body { display: block; }

  .info-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label {
    font-size: 12px;
    color: var(--text-secondary);
    width: 90px;
    flex-shrink: 0;
  }
  .info-value {
    font-size: 15px;
    font-weight: 500;
    flex: 1;
  }
  .info-value.muted { color: #bbb; font-weight: 400; }
  .call-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--primary-light);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .call-btn svg {
    width: 18px;
    height: 18px;
    fill: var(--primary);
  }
  .call-btn:active { background: #c8ddf8; }

  /* No results */
  .no-results {
    text-align: center;
    padding: 48px 16px;
    color: var(--text-secondary);
  }
  .no-results svg {
    width: 48px;
    height: 48px;
    fill: #dadce0;
    margin-bottom: 12px;
  }
  .no-results p { font-size: 14px; }

  /* Counter */
  .result-count {
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
    padding: 8px;
  }

  /* Desktop */
  @media (min-width: 640px) {
    .content { max-width: 600px; margin: 0 auto; padding: 12px 16px 40px; }
    .header { padding: 20px 0 16px; }
    .header-inner { max-width: 600px; margin: 0 auto; padding: 0 16px; }
    .header h1 { font-size: 20px; }
    .tabs { max-width: 600px; margin: 0 auto; }
    .card-header { padding: 14px 20px; }
    .card-body { padding: 0 20px 16px; }
  }

  /* highlight */
  mark {
    background: #fbbc04;
    color: var(--text);
    border-radius: 2px;
    padding: 0 1px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>心臓血管外科 電話帳</h1>
    <div class="subtitle">R8.4.1付</div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="名前・読みで検索..." autocomplete="off" autofocus>
      <button class="clear-btn" id="clearBtn" aria-label="クリア">&times;</button>

  </div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="all">全員</div>
  <div class="tab" data-tab="doctor">医師</div>
  <div class="tab" data-tab="staff">スタッフ</div>

    {name:"当直当番",reading:"とうちょく",phs:"8209",dial:"06-6816-4035"},
    {name:"災害時優先回線",reading:"さいがい",phs:"2190",dial:""}
  ]
};

const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const content = document.getElementById('content');
const tabsEl = document.getElementById('tabs');
let currentTab = 'all';

// Tab switching
tabsEl.addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  tabsEl.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentTab = tab.dataset.tab;
  render();
});

// Search
searchInput.addEventListener('input', () => {
  clearBtn.classList.toggle('visible', searchInput.value.length > 0);
  render();
});
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.classList.remove('visible');
  searchInput.focus();
  render();
});

// Expand card
content.addEventListener('click', e => {
  const header = e.target.closest('.card-header');
  if (!header) return;
  header.closest('.card').classList.toggle('open');
});

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(q, 'gi'), m => `<mark>${m}</mark>`);
}

function matches(item, query) {
  if (!query) return true;
  const q = query.toLowerCase();
  return item.name.toLowerCase().includes(q) ||
         item.reading.toLowerCase().includes(q) ||
         (item.phs && item.phs.includes(q)) ||
         (item.dial && item.dial.includes(q)) ||
         (item.personal && item.personal.includes(q));
}

function phoneIcon() {
  return '<svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24 11.36 11.36 0 003.58.57 1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1 11.36 11.36 0 00.57 3.58 1 1 0 01-.25 1.01l-2.2 2.2z"/></svg>';
}

function renderInfoRow(label, value, callable) {
  const hasValue = value && value !== '—';
  const display = hasValue ? value : '—';
  const cls = hasValue ? '' : ' muted';
  let callHtml = '';
  if (callable && hasValue) {
    callHtml = `<a href="tel:${value.replace(/-/g,'')}" class="call-btn" onclick="event.stopPropagation()" aria-label="発信">${phoneIcon()}</a>`;
  }
  return `<div class="info-row"><span class="info-label">${label}</span><span class="info-value${cls}">${display}</span>${callHtml}</div>`;
}

function renderCard(item, type, query) {
  const avatarClass = type === 'staff' ? ' staff' : type === 'shared' ? ' shared' : '';
  const initial = item.name.charAt(0);
  const nameHtml = highlight(item.name, query);
  const readingHtml = highlight(item.reading, query);
  const yearHtml = item.year ? `<div class="year">${item.year}</div>` : '';

  let bodyRows = '';
  bodyRows += renderInfoRow('PHS内線', item.phs, true);
  bodyRows += renderInfoRow('PHS外線', item.dial, true);
  if (type === 'doctor') {
    bodyRows += renderInfoRow('個人番号', item.personal, true);
  }

  return `<div class="card">
    <div class="card-header">
      <div class="avatar${avatarClass}">${initial}</div>
      <div class="card-name">
        <div class="name">${nameHtml}</div>
        <div class="reading">${readingHtml}</div>
        ${yearHtml}
      </div>
      <svg class="expand-icon" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
    </div>
    <div class="card-body">${bodyRows}</div>
  </div>`;
}

function render() {
  const query = searchInput.value.trim();
  let html = '';
  let total = 0;

  const sections = [];
  if (currentTab === 'all' || currentTab === 'doctor') {
    const items = DATA.doctors.filter(d => matches(d, query));
    if (items.length) sections.push({label: `医師（${items.length}）`, items, type: 'doctor'});
    total += items.length;
  }
  if (currentTab === 'all' || currentTab === 'staff') {
    const items = DATA.staff.filter(d => matches(d, query));
    if (items.length) sections.push({label: `スタッフ（${items.length}）`, items, type: 'staff'});
    total += items.length;
  }
  if (currentTab === 'all' || currentTab === 'shared') {
    const items = DATA.shared.filter(d => matches(d, query));
    if (items.length) sections.push({label: `共用番号（${items.length}）`, items, type: 'shared'});
    total += items.length;
  }

  if (total === 0) {
    html = `<div class="no-results">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <p>「${escapeHtml(query)}」に一致する連絡先はありません</p>
    </div>`;
  } else {
    if (query) {
      html += `<div class="result-count">${total}件の結果</div>`;
    }
    for (const sec of sections) {
      html += `<div class="section-label">${sec.label}</div>`;
      for (const item of sec.items) {
        html += renderCard(item, sec.type, query);
      }
    }
  }

  content.innerHTML = html;

  // Auto-expand if only one result
  if (total === 1) {
    const card = content.querySelector('.card');
    if (card) card.classList.add('open');
  }
}

render();
</script>
</body>
</html>
